version: "3.8"

services:
  web-node:
    image: svelte-docker-node
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${WEB_DATABASE_URL}
    ports:
      - ${WEB_PORT}:3000
    environment:
      AMQP_HOST: message-queue
      AMQP_PORT: 5672
      AMQP_USERNAME: ${AMQP_USERNAME}
      AMQP_PASSWORD: ${AMQP_PASSWORD}
      ORIGIN: ${WEB_ORIGIN}
      DATABASE_URL: ${WEB_DATABASE_URL}
    depends_on:
      - message-queue
    restart: always
  worker-add:
    image: python-worker
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      AMQP_HOST: message-queue
      AMQP_PORT: 5672
      AMQP_USERNAME: ${AMQP_USERNAME}
      AMQP_PASSWORD: ${AMQP_PASSWORD}
      WORKER: add
    depends_on:
      - message-queue
    restart: always
  worker-plate-solving:
    image: python-worker
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      AMQP_HOST: message-queue
      AMQP_PORT: 5672
      AMQP_USERNAME: ${AMQP_USERNAME}
      AMQP_PASSWORD: ${AMQP_PASSWORD}
      WORKER: plate-solving
    depends_on:
      - message-queue
    restart: always
  message-queue:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${AMQP_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${AMQP_PASSWORD}
    ports:
      # HTTP management UI
      - 15672:15672
